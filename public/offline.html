<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideShare - Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background-color: #000;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            margin-bottom: 1rem;
        }

        p {
            margin-bottom: 2rem;
            max-width: 600px;
            line-height: 1.6;
        }

        .button {
            background-color: #000;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .button:hover {
            background-color: #333;
        }

        footer {
            background-color: #000;
            color: white;
            padding: 1rem;
            text-align: center;
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <header>
        <h2>RideShare</h2>
    </header>

    <main>
        <div class="icon">📶</div>
        <h1>You're Offline</h1>
        <p>
            It looks like you're currently offline. Some features of RideShare may not be available until you reconnect
            to the internet.
            You can still access previously loaded content and any rides you've saved.
        </p>
        <button class="button" id="retry-button">Retry Connection</button>
    </main>

    <footer>
        &copy; 2025 RideShare. All rights reserved.
    </footer>

    <script>
        // Add event listener to retry button
        document.getElementById('retry-button').addEventListener('click', function () {
            // Try to reload the page
            window.location.reload();
        });

        // Listen for online status changes
        window.addEventListener('online', function () {
            // Redirect to home page when back online
            window.location.href = '/';
        });
    </script>
</body>

</html>
